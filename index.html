<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>大狗智能体管理</title>
</head>
<body>
<h1>大狗智能体管理</h1>

<h2>创建 IP 账号</h2>
<form id="ipForm">
  ID：<input type="number" id="ip_id" value="464649494"><br>
  姓名：<input type="text" id="name" value="米七"><br>
  行业：<input type="text" id="industry" value="武夷岩茶"><br>
  产品：<input type="text" id="product" value="肉桂"><br>
  人物设定：<input type="text" id="persona"><br>
  客户概况：<input type="text" id="customer_profile"><br>
  <button type="button" onclick="createIP()">创建</button>
</form>

<pre id="ipResult"></pre>

<h2>生成文案</h2>
<form id="copyForm">
  IP ID：<input type="number" id="copy_ip_id" value="464649494"><br>
  主题：<input type="text" id="topic" value="大桂"><br>
  <button type="button" onclick="generateCopy()">生成</button>
</form>

<pre id="copyResult"></pre>

<script>
async function createIP() {
  const data = {
    id: parseInt(document.getElementById("ip_id").value),
    name: document.getElementById("name").value,
    industry: document.getElementById("industry").value,
    product: document.getElementById("product").value,
    persona: document.getElementById("persona").value,
    customer_profile: document.getElementById("customer_profile").value
  };

  const res = await fetch('/ip_account', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });

  const result = await res.json();
  document.getElementById("ipResult").textContent = JSON.stringify(result, null, 2);

  // 自动填充生成文案表单的 IP ID
  if(result.account && result.account.id) {
    document.getElementById("copy_ip_id").value = result.account.id;
  }
}

async function generateCopy() {
  const data = {
    ip_id: parseInt(document.getElementById("copy_ip_id").value),
    topic: document.getElementById("topic").value
  };

  const res = await fetch('/generate_copy', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });

  const result = await res.json();
  document.getElementById("copyResult").textContent = JSON.stringify(result, null, 2);
}
</script>
</body>
</html>
